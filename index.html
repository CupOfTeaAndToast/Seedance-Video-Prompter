<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance Pipeline Director v32</title>
<style>
        :root {
            --bg-base: #fcfcfd;
            --bg-surface: #ffffff;
            --bg-input: #ffffff;
            --accent: #ff6600; /* Vivid Orange Accent */
            --accent-hover: #e05500;
            --text-main: #101828;
            --text-muted: #667085;
            --border: #d0d5dd;
            --success: #12b76a;
            
            --c-time: #667085;
            --c-cam: #e05500;
            --c-dir: #175cd3;
            --c-audio: #7a5af8;
            --c-meta: #027a48;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); padding: 1.5rem; min-height: 100vh; display: flex; justify-content: center; }
        
        .workspace {
            width: 100%;
            max-width: 1650px;
            display: grid;
            grid-template-columns: 540px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 1200px) { .workspace { grid-template-columns: 1fr; } .sticky-aside { position: static !important; height: auto !important; } }

        .panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(16,24,40,0.05); }
        .control-column { display: flex; flex-direction: column; gap: 1.25rem; }
        .sticky-aside { position: sticky; top: 1.5rem; height: calc(100vh - 3rem); display: flex; flex-direction: column; gap: 1rem; }

        h2 { font-size: 0.95rem; font-weight: 700; text-transform: capitalize; letter-spacing: 0px; margin-bottom: 1.25rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
        .form-group:last-child { margin-bottom: 0; }
        .form-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
        .form-row:last-child { margin-bottom: 0; }

        label { font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem; text-transform: capitalize; }
        
        /* White Tiled Pill/Button Styles from Screenshot */
        select, input[type="text"], textarea, .lock-btn { 
            background: var(--bg-input); 
            border: 1px solid var(--border); 
            color: #344054; 
            padding: 0.625rem 1.25rem; 
            border-radius: 8px; 
            font-size: 0.875rem; 
            font-weight: 500;
            width: auto; 
            outline: none; 
            cursor: pointer;
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
        }
        
        select:hover, input[type="text"]:hover, textarea:hover, .lock-btn:hover {
            background-color: #f9fafb;
            border-color: #98a2b3;
            color: #1d2939;
        }

        textarea { width: 100%; resize: vertical; font-family: monospace; cursor: text; }
        input[type="text"] { width: 100%; cursor: text; }

        /* Bright Orange Active Choice Selection Profile */
        .lock-btn.locked, select:focus { 
            background-color: var(--accent) !important; 
            border-color: var(--accent) !important; 
            color: #ffffff !important; 
            font-weight: 600;
            box-shadow: 0px 1px 2px rgba(255, 102, 0, 0.2);
        }

        .file-upload-wrapper { position: relative; display: inline-block; width: 100%; }
        .file-upload-btn { background: var(--bg-input); border: 1px dashed var(--border); color: var(--text-main); padding: 0.625rem; border-radius: 8px; font-size: 0.85rem; text-align: center; cursor: pointer; display: block; font-weight: 600; }
        .file-upload-btn:hover { border-color: var(--accent); background: rgba(255, 102, 0, 0.05); }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .slider-box { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
        input[type="range"] { flex: 1; accent-color: var(--accent); background: #f2f4f7; height: 6px; border-radius: 3px; appearance: none; }
        .slider-val { background: var(--bg-input); border: 1px solid var(--border); font-size: 0.85rem; font-weight: 700; padding: 0.3rem 0.6rem; border-radius: 6px; min-width: 4rem; text-align: center; }

        .hidden-panel { display: none !important; }

        .lock-container { background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; margin-top: 0.5rem; max-height: 260px; overflow-y: auto; }
        .lock-row { display: flex; align-items: center; justify-content: space-between; background: #ffffff; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; border: 1px solid #eaecf0; }
        .lock-row:last-child { margin-bottom: 0; }
        
        .lock-btn:disabled {
            opacity: 0.25 !important;
            background-color: #f2f4f7 !important;
            border-color: #d0d5dd !important;
            color: #98a2b3 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
/* --- REFRESHED PROMPT TEXT ARCHITECTURE --- */
        .canvas-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 0; 
        }

        .stream-view { 
            flex: 1; 
            background: #f8f9fa; /* Warm off-white canvas backdrop */
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 1.5rem; 
            font-family: "SFMono-Regular", Consolas, Menlo, monospace; 
            font-size: 0.9rem; 
            line-height: 1.7; 
            overflow-y: auto; 
            white-space: pre-wrap;
            color: #344054;
            box-shadow: inset 0px 2px 4px rgba(0, 0, 0, 0.02);
        }
        
        /* High-contrast accessible text markers */
        .t-time  { color: #667085; font-weight: 700; display: block; margin-top: 0.5rem; }
        .t-cam   { color: #b93c00; font-weight: 500; }
        .t-dir   { color: #1153c0; font-weight: 500; }
        .t-audio { color: #6938ef; font-weight: 500; }
        .t-meta  { color: #026aa2; font-weight: 500; }

        .footer-metrics { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #ffffff; 
            padding: 1rem; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin: 0.75rem 0; 
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
        }
        
        .metric-label { font-size: 0.85rem; font-weight: 600; color: #344054; }
        
        /* Main Action Submission Triggers */
        .btn-action { 
            background: var(--accent); 
            color: #ffffff; 
            border: 1px solid var(--accent);
            padding: 0.75rem 1.5rem; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.95rem; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: 0px 1px 2px rgba(255, 102, 0, 0.2);
            transition: all 0.2s ease-in-out;
        }
        
        .btn-action:hover { 
            background: var(--accent-hover); 
            border-color: var(--accent-hover);
        }
        
        .btn-roll { 
            background: #12b76a; 
            border-color: #12b76a;
            margin-bottom: 0.5rem; 
            box-shadow: 0px 1px 2px rgba(18, 183, 106, 0.2);
        }
        
        .btn-roll:hover { 
            background: #027a48; 
            border-color: #027a48;
        }
    </style>
</head>
<body>

                    </div>
                </div>
            </div>

            <div class="form-group" id="container-timing-preset">
                <label>Shot Duration Pacing Mix</label>
                <select id="p-timing-preset">
                    <option value="uniform">Uniform Balanced Divisions (Equal beats)</option>
                    <option value="front">Front-Ended Sequence (Rapid opening cuts)</option>
                    <option value="back">Back-Ended Sequence (Cuts quicken near end)</option>
                    <option value="erratic">Erratic Disjointed Mix (Randomized durations)</option>
                </select>
            </div>
        </div>

        <div class="panel" id="panel-lock-registry">

            <label style="margin-bottom: 0.25rem; display: block;">Toggle 🔒 to freeze camera path and action mechanics on individual shots</label>
            <div class="lock-container" id="lock-rows-wrapper"></div>
        </div>

        <div class="panel">

            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Action/Motion</label>
                    <select id="p-genre">
<option value="beverage"> Beverage</option>
<option value="office"> Office</option>
<option value="tech"> Tech</option>
<option value="door"> Door</option>
<option value="clothing"> Clothing</option>
<option value="maintenance"> Maintenance</option>
<option value="map"> Map</option>
<option value="medical"> Medical</option>
<option value="flashlight"> Flashlight</option>
<option value="cleaning"> Cleaning</option>
<option value="mixmatch"> Mix-Match</option>
                        <option value="universal"> Universal/General (Default Stock)</option>

                        <option value="cyberpunk"> Sci-Fi & Cyberpunk Pack</option>

                </div>

                    <label>Import Custom File (.txt / .json)</label>
                    <div class="file-upload-wrapper">
                        <span class="file-upload-btn" id="file-label-view">Choose Behavior File...</span>
                        <input type="file" id="p-file-loader" accept=".txt,.json">
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Primary Camera Vector</label>
                    <select id="p-movement">

                        <option value="Dolly path tracking">Dolly Path Only</option>

        <div class="panel">
            <h2>4. DIALOGUE</h2>
<!-- START: Speaker Context Extension -->
<div class="input-group-wrapper" style="margin-bottom: 12px;">

</div>

        </div>

        <div class="panel">

                </div>
                <div class="form-group">
                    <label>Compositional Mood</label>
                    <select id="p-mood"></select>
                </div>
            </div>
        </div>

    </div>

    <div class="sticky-aside canvas-area panel">

        <button class="btn-action btn-roll" onclick="rollUnlockedElements()">🎲 Regenerate Prompt</button>

        </div>

        <button class="btn-action" onclick="copyPipelineOutput()">Copy Prompt</button>
    </div>

</div>

    function getActiveBehaviorPool() {
        const currentGenre = document.getElementById("p-genre").value;
        return (currentGenre === "external" && GENRE_BEHAVIOR_MATRIX.external.length > 0)

function syncDynamicLockRegistry() {
    const structure = document.getElementById("p-structure").value;
    const totalShots = structure === "single" ? 1 : parseInt(document.getElementById("p-shots").value);
    const wrapper = document.getElementById("lock-rows-wrapper");
    const currentPool = getActiveBehaviorPool();
    
    let oldData = [...PERSISTENT_SHOTS_DATA];
    PERSISTENT_SHOTS_DATA = [];
    wrapper.innerHTML = "";

    for (let i = 0; i < totalShots; i++) {
        let existing = oldData[i];
        // Fallback or maintain independent states if they already exist
        let isCamLocked = existing ? (existing.cameraLocked !== undefined ? existing.cameraLocked : existing.locked) : false;
        let isActLocked = existing ? (existing.actionLocked !== undefined ? existing.actionLocked : existing.locked) : false;
        
        let cameraValue = existing ? existing.camera : getRandomValueFrom(OPTICAL_POOL);
        let actionValue = existing ? existing.action : getRandomValueFrom(currentPool);

        PERSISTENT_SHOTS_DATA.push({
            cameraLocked: isCamLocked,
            actionLocked: isActLocked,
            camera: cameraValue,
            action: actionValue
        });

let row = document.createElement("div");
        row.className = "lock-row";
        row.innerHTML = `
            <span><strong>Shot ${i+1}</strong> Components</span>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <div style="display: flex; gap: 2px;">
                    <button class="lock-btn" onclick="moveShot(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Move Up">▲</button>
                    <button class="lock-btn" onclick="moveShot(${i}, 1)" ${i === PERSISTENT_SHOTS_DATA.length - 1 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Move Down">▼</button>
                </div>
                <button class="lock-btn ${isCamLocked ? 'locked' : ''}" onclick="toggleIndependentLock(${i}, 'camera', this)" title="Lock Optics">${isCamLocked ? '🔒' : '🔓'} 📷</button>
                <button class="lock-btn ${isActLocked ? 'locked' : ''}" onclick="toggleIndependentLock(${i}, 'action', this)" title="Lock Action">${isActLocked ? '🔒' : '🔓'} 🏃‍♂️</button>
            </div>
        `;
        wrapper.appendChild(row);
    } // This bracket closes your loop
}

function toggleIndependentLock(index, type, btnElement) {
    if (type === 'camera') {
        let state = !PERSISTENT_SHOTS_DATA[index].cameraLocked;
        PERSISTENT_SHOTS_DATA[index].cameraLocked = state;
        btnElement.classList.toggle("locked", state);
        btnElement.innerText = state ? "🔒 📷" : "🔓 📷";
    } else if (type === 'action') {
        let state = !PERSISTENT_SHOTS_DATA[index].actionLocked;
        PERSISTENT_SHOTS_DATA[index].actionLocked = state;
        btnElement.classList.toggle("locked", state);
        btnElement.innerText = state ? "🔒 🏃‍♂️" : "🔓 🏃‍♂️";
    }
    compilePipelineOutput();
}
function moveShot(currentIndex, direction) {
    const targetIndex = currentIndex + direction;

    // Safety check boundary guards
    if (targetIndex < 0 || targetIndex >= PERSISTENT_SHOTS_DATA.length) return;

    // 1. Swap data entries inside your persistent state tracker array
    const temporaryHolder = PERSISTENT_SHOTS_DATA[currentIndex];
    PERSISTENT_SHOTS_DATA[currentIndex] = PERSISTENT_SHOTS_DATA[targetIndex];
    PERSISTENT_SHOTS_DATA[targetIndex] = temporaryHolder;

    // 2. Clear out old text values and recalculate prompts
    compilePipelineOutput();

    // 3. FORCE FRESH UI REDRAW (Fixed for down navigation)
    const wrapper = document.getElementById("lock-rows-wrapper");
    if (!wrapper) return;
    
    wrapper.innerHTML = "";
    PERSISTENT_SHOTS_DATA.forEach((shot, i) => {
        let row = document.createElement("div");
        row.className = "lock-row";
        row.innerHTML = `
            <span><strong>Shot ${i+1}</strong> Components</span>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <div style="display: flex; gap: 2px;">
                    <button class="lock-btn" onclick="moveShot(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Move Up">▲</button>
                    <button class="lock-btn" onclick="moveShot(${i}, 1)" ${i === PERSISTENT_SHOTS_DATA.length - 1 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Move Down">▼</button>
                </div>
                <button class="lock-btn ${shot.cameraLocked ? 'locked' : ''}" onclick="toggleIndependentLock(${i}, 'camera', this)" title="Lock Optics">${shot.cameraLocked ? '🔒' : '🔓'} 📷</button>
                <button class="lock-btn ${shot.actionLocked ? 'locked' : ''}" onclick="toggleIndependentLock(${i}, 'action', this)" title="Lock Action">${shot.actionLocked ? '🔒' : '🔓'} 🏃‍♂️</button>
            </div>
        `;
        wrapper.appendChild(row);
    });
}
    function getRandomValueFrom(array) {
        if (!array || array.length === 0) return "executes unmapped structural transition behavior movement";
        return array[Math.floor(Math.random() * array.length)];
    }

function rollUnlockedElements() {
    const movementMode = document.getElementById("p-movement").value;
    const currentPool = getActiveBehaviorPool();
    PERSISTENT_SHOTS_DATA.forEach((shot) => {
        // Only update camera if camera is unlocked
        if (!shot.cameraLocked) {
            shot.camera = (movementMode === "randomize") ? getRandomValueFrom(OPTICAL_POOL) : movementMode;
        }
        // Only update action if action is unlocked
        if (!shot.actionLocked) {
            shot.action = getRandomValueFrom(currentPool);
        }
    });
    compilePipelineOutput();
}

    function registerEventHandlers() {

    function calculateSegmentDurations(totalTime, shotCount, preset) {
        let fractions = [];
        if (preset === "uniform" || shotCount === 1) {
            for (let i = 0; i < shotCount; i++) fractions.push(1);
        } else if (preset === "front") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + i * 0.5);
        } else if (preset === "back") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + (shotCount - 1 - i) * 0.5);
        } else if (preset === "erratic") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + (Math.sin(i * 1.7 + totalTime) + 1) * 0.8);
        }
        let sum = fractions.reduce((a, b) => a + b, 0);
        return fractions.map(f => (f / sum) * totalTime);
    }

    function calculateDialogueMapping(totalShots, scriptLines, shiftValue) {
        let mapping = new Array(totalShots).fill(null);
        if (scriptLines.length === 0) return mapping;
        let maxAvailableOffset = Math.max(0, totalShots - scriptLines.length);
        let normalizedShift = Math.min(maxAvailableOffset, Math.floor((shiftValue / 10) * (maxAvailableOffset + 0.99)));
        for (let i = 0; i < scriptLines.length; i++) {
            let targetIdx = normalizedShift + i;
            if (targetIdx < totalShots) mapping[targetIdx] = scriptLines[i];
        }
        return mapping;
    }

    function extractSubjectCoreSnippet(anchorText) {
        if (!anchorText) return "subject";
        let words = anchorText.split(/\s+/).filter(w => w.length > 0);
        if (words.length <= 6) return words.join(" ");
        return words.slice(0, 6).join(" ");
    }

    function compilePipelineOutput() {

        const dialogueInput = document.getElementById("p-dialogue").value;

        const shiftValue = parseInt(document.getElementById("p-dialogue-shift").value);
        const audioMode = document.getElementById("p-audiomode").value;

        const scriptLines = dialogueInput.split('\n').map(l => l.trim()).filter(l => l !== '');
// Extract the optional speaker voice profile
const speakerProfile = document.getElementById("audio-speaker-context").value.trim();
        const shotDurations = calculateSegmentDurations(duration, totalShots, timingPreset);
        const dialogueMap = calculateDialogueMapping(totalShots, scriptLines, shiftValue);

        let rawText = `MASTER SCENARIO CONTEXT: ${anchorSubject}\n`;
        rawText += `CONFIG PROFILE: [Type: ${category}] [Structure: ${structure === "single" ? "Continuous Shot" : "Sequence Array"}]\n\n`;

        let currentTimelineTime = 0;

for (let i = 0; i < totalShots; i++) {
            let currentDur = shotDurations[i];
            let start = currentTimelineTime.toFixed(1);
            let end = (currentTimelineTime + currentDur).toFixed(1);
            currentTimelineTime += currentDur;

            let vibrationMod = "";
            if (energy > 0) {
                if (energy <= 3) vibrationMod = "with subtle stable stabilization anchors";
                else if (energy > 3 && energy <= 7) vibrationMod = "accompanied by loose handheld organic drift patterns";
                else vibrationMod = "driven by erratic high-frequency tracking jitters and rapid tracking corrections";
            } else { vibrationMod = "locked absolute zero-velocity tripod lock"; }

            let shotMemory = PERSISTENT_SHOTS_DATA[i];
            
            // Render specific visual markers depending on which components are frozen
            let statusMarkers = "";
            if (shotMemory.cameraLocked) statusMarkers += "🔒📷 ";
            if (shotMemory.actionLocked) statusMarkers += "🔒🏃‍♂️ ";

            viewHtml += `<span class="t-time">[SHOT ${i + 1} TIMEMARK: ${start}s - ${end}s] ${statusMarkers}</span>\n`;
            rawText  += `[SHOT ${i + 1} TIMEMARK: ${start}s - ${end}s]\n`;

            viewHtml += `<span class="t-cam"> - Optics: Axis directional ${shotMemory.camera}, ${vibrationMod}.</span>\n`;
            rawText  += ` - Optics: Axis directional ${shotMemory.camera}, ${vibrationMod}.\n`;

            let highImpactAction = shotMemory.action.replace(/^(violently|aggressively|strikes|ducks|kicks|pivots|loses|reaches|lunges|hurls|braces|smashes|charges|slides|grabs|collides|swipes|leaps|recoils|punches|climbs|tears|sweeps|slams|intercepts|drops|wrenches|skids|grapples|stumbles|shoves|rips|vaults|bounds|dives|pokes|snatches|veers|boots|wears|interfaces|looks|blocks|parries|executes|adjusts)/i, (match) => {
                return `${subjectSnippet} ${match.toLowerCase()}`;
            });
            
            if (highImpactAction === shotMemory.action) {
                highImpactAction = `${subjectSnippet} ${shotMemory.action}`;
            }

            viewHtml += `<span class="t-dir"> - Action: ${highImpactAction}.</span>\n`;
            rawText  += ` - Action: ${highImpactAction}.\n`;

// --- UPDATED STEP 3 AUDIO ASSEMBLY LOGIC ---
if (dialogueMap[i]) {
    let formattedAudioSegment = "";
    if (speakerProfile) {
        // Formats exactly to: [Speaker Profile]: "Your dialogue line text here"
        formattedAudioSegment = `${speakerProfile}: "${dialogueMap[i]}"`;
    } else {
        formattedAudioSegment = `"${dialogueMap[i]}"`;
    }

    viewHtml += `<span class="t-audio"> - Audio Sync: ${formattedAudioSegment}</span>\n`;
    rawText  += ` - Audio Sync: ${formattedAudioSegment}\n`;
}
// --- END AUDIO ASSEMBLY ---
            
            viewHtml += `\n`; rawText  += `\n`;
        }

        viewHtml += `<span class="t-audio">AUDIO DIRECTIVE:</span>\n`;
        rawText  += `AUDIO DIRECTIVE:\n`;

        if (audioMode === "foley") {
            viewHtml += `<span class="t-audio"> - Layer: Natural environment location foley effects, high atmospheric background noise track preservation.</span>\n`;

        } else {

            rawText  += ` - Layer: Local physical environmental foley synced with instrumental soundtrack layer [Score: ${inst}] [Acoustic Vibe: ${mood}].\n`;
        }

        viewHtml += `<span class="t-meta"> - Render Directives: Maintain absolute multi-frame consistency matrix. Prevent spatial warping loops. [Cut Style: Hard cinematic jumps, zero fluid interpolation or morphing between timestamps]. Render crisp 8k detail resolution. No letterboxing fields.</span>`;
        rawText  += ` - Render Directives: Maintain absolute multi-frame consistency matrix. Prevent spatial warping loops. [Cut Style: Hard cinematic jumps, zero fluid interpolation or morphing between timestamps]. Render crisp 8k detail resolution. No letterboxing fields.`;

        const viewContainer = document.getElementById("output-view");
        viewContainer.innerHTML = viewHtml;
        viewContainer.setAttribute("data-raw", rawText);

        updateTokenBudgetUi(rawText.length);
    }

    function updateTokenBudgetUi(charCount) {
        const label = document.getElementById("char-counter");
        const warn = document.getElementById("budget-warning");
        label.innerText = charCount;
        if (charCount <= 5500) { label.style.color = "var(--success)"; warn.innerText = ""; } 
        else if (charCount > 5500 && charCount <= 7500) {
            label.style.color = "var(--warning)"; warn.innerText = "⚠️ APPROACHING SEEDANCE 7500 CHARACTER LIMIT"; warn.style.color = "var(--warning)";
        } else { label.style.color = "var(--danger)"; warn.innerText = "🚨 EXCEEDING MAX SYSTEM TOKEN LIMIT"; warn.style.color = "var(--danger)"; }
    }

    function copyPipelineOutput() {
        navigator.clipboard.writeText(document.getElementById("output-view").getAttribute("data-raw")).then(() => {
            alert("v12.1 custom array output written to system clipboard!");
        });
    }
