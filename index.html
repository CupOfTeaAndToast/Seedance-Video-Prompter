<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance Pipeline Director v35</title>
<style>
        :root {
            --bg-base: #fcfcfd;
            --bg-surface: #ffffff;
            --bg-input: #ffffff;
            --accent: #ff6600; /* Vivid Orange Accent */
            --accent-hover: #e05500;
            --text-main: #101828;
            --text-muted: #667085;
            --border: #d0d5dd;
            --success: #12b76a;
            
            --c-time: #667085;
            --c-cam: #e05500;
            --c-dir: #175cd3;
            --c-audio: #7a5af8;
            --c-meta: #027a48;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); padding: 1.5rem; min-height: 100vh; display: flex; justify-content: center; }
        
        .workspace {
            width: 100%;
            max-width: 1650px;
            display: grid;
            grid-template-columns: 540px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 1200px) { .workspace { grid-template-columns: 1fr; } .sticky-aside { position: static !important; height: auto !important; } }

        .panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(16,24,40,0.05); }
        .control-column { display: flex; flex-direction: column; gap: 1.25rem; }
        .sticky-aside { position: sticky; top: 1.5rem; height: calc(100vh - 3rem); display: flex; flex-direction: column; gap: 1rem; }

        h2 { font-size: 0.95rem; font-weight: 700; text-transform: capitalize; letter-spacing: 0px; margin-bottom: 1.25rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
        .form-group:last-child { margin-bottom: 0; }
        .form-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
        .form-row:last-child { margin-bottom: 0; }

        label { font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem; text-transform: capitalize; }
        
        /* White Tiled Pill/Button Styles from Screenshot */
        select, input[type="text"], textarea, .lock-btn { 
            background: var(--bg-input); 
            border: 1px solid var(--border); 
            color: #344054; 
            padding: 0.625rem 1.25rem; 
            border-radius: 8px; 
            font-size: 0.875rem; 
            font-weight: 500;
            width: auto; 
            outline: none; 
            cursor: pointer;
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
        }
        
        select:hover, input[type="text"]:hover, textarea:hover, .lock-btn:hover {
            background-color: #f9fafb;
            border-color: #98a2b3;
            color: #1d2939;
        }

        textarea { width: 100%; resize: vertical; font-family: monospace; cursor: text; }
        input[type="text"] { width: 100%; cursor: text; }

        /* Bright Orange Active Choice Selection Profile */
        .lock-btn.locked, select:focus { 
            background-color: var(--accent) !important; 
            border-color: var(--accent) !important; 
            color: #ffffff !important; 
            font-weight: 600;
            box-shadow: 0px 1px 2px rgba(255, 102, 0, 0.2);
        }

        .file-upload-wrapper { position: relative; display: inline-block; width: 100%; }
        .file-upload-btn { background: var(--bg-input); border: 1px dashed var(--border); color: var(--text-main); padding: 0.625rem; border-radius: 8px; font-size: 0.85rem; text-align: center; cursor: pointer; display: block; font-weight: 600; }
        .file-upload-btn:hover { border-color: var(--accent); background: rgba(255, 102, 0, 0.05); }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .slider-box { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
        input[type="range"] { flex: 1; accent-color: var(--accent); background: #f2f4f7; height: 6px; border-radius: 3px; appearance: none; }
        .slider-val { background: var(--bg-input); border: 1px solid var(--border); font-size: 0.85rem; font-weight: 700; padding: 0.3rem 0.6rem; border-radius: 6px; min-width: 4rem; text-align: center; }

        .hidden-panel { display: none !important; }

        .lock-container { background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; margin-top: 0.5rem; max-height: 260px; overflow-y: auto; }
        .lock-row { display: flex; align-items: center; justify-content: space-between; background: #ffffff; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; border: 1px solid #eaecf0; }
        .lock-row:last-child { margin-bottom: 0; }
        
        .lock-btn:disabled {
            opacity: 0.25 !important;
            background-color: #f2f4f7 !important;
            border-color: #d0d5dd !important;
            color: #98a2b3 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
/* --- REFRESHED PROMPT TEXT ARCHITECTURE --- */
        .canvas-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 0; 
        }

        .stream-view { 
            flex: 1; 
            background: #f8f9fa; /* Warm off-white canvas backdrop */
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 1.5rem; 
            font-family: "SFMono-Regular", Consolas, Menlo, monospace; 
            font-size: 0.9rem; 
            line-height: 1.7; 
            overflow-y: auto; 
            white-space: pre-wrap;
            color: #344054;
            box-shadow: inset 0px 2px 4px rgba(0, 0, 0, 0.02);
        }
        
        /* High-contrast accessible text markers */
        .t-time  { color: #667085; font-weight: 700; display: block; margin-top: 0.5rem; }
        .t-cam   { color: #b93c00; font-weight: 500; }
        .t-dir   { color: #1153c0; font-weight: 500; }
        .t-audio { color: #6938ef; font-weight: 500; }
        .t-meta  { color: #026aa2; font-weight: 500; }

        .footer-metrics { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #ffffff; 
            padding: 1rem; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin: 0.75rem 0; 
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
        }
        
        .metric-label { font-size: 0.85rem; font-weight: 600; color: #344054; }
        
        /* Main Action Submission Triggers */
        .btn-action { 
            background: var(--accent); 
            color: #ffffff; 
            border: 1px solid var(--accent);
            padding: 0.75rem 1.5rem; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.95rem; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: 0px 1px 2px rgba(255, 102, 0, 0.2);
            transition: all 0.2s ease-in-out;
        }
        
        .btn-action:hover { 
            background: var(--accent-hover); 
            border-color: var(--accent-hover);
        }
        
        .btn-roll { 
            background: #12b76a; 
            border-color: #12b76a;
            margin-bottom: 0.5rem; 
            box-shadow: 0px 1px 2px rgba(18, 183, 106, 0.2);
        }
        
        .btn-roll:hover { 
            background: #027a48; 
            border-color: #027a48;
        }
    </style>
</head>
<body>

<div class="workspace">
    
    <div class="control-column">
        
        <div class="panel">
            <h2>1. VISUAL SETTINGS</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Video Category</label>
<select id="p-category">

    <option disabled>───────────────────</option>

    <option value="Vibrant high-contrast modern block-buster color grading, teal and orange palette color science, impeccable fluid motion tracking focus, razor-sharp textures, dynamic studio lighting setups, premium advertising polish.">
        Premium Promo (High-Contrast Teal & Orange, Fluid Tracking)

    <option disabled>───────────────────</option>
    
    <option value="Immersive first-person POV action perspective, shot on ultra-wide 8mm fisheye lens, authentic tactical bodycam distortion artifacts, low-angle barrel distortion warp, high physical kinetic camera feedback, rapid head-turning velocity motion blur.">

    <option value="Grainy low-resolution CCTV surveillance camera stream, 4:3 aspect ratio, analog tape degradation artifacts, twitchy interlaced frame skips, low-fidelity night-vision infrared filter, glowing ghosting halos around moving light sources, monochrome green hues.">

    <option disabled>───────────────────</option>

    <option value="Vintage super 8mm film format, severe chromatic fringing anomalies, nostalgic sun-drenched polaroid color grading, warm light leaks slicing vertically down the frames, heavy gate jitter flicker, vintage analog texture palette.">
        Super 8 Nostalgia (Sun-Drenched Polaroid Coloring)
    </option>

    <option value="Lo-fi early 2000s cyber-shot digital camera aesthetic, harsh raw direct on-camera xenon flash exposure, hard dark drop shadows directly behind objects, low-fidelity CCD sensor color science, slightly overexposed skin tones, amateur flash snapshot styling.">
        Y2K Digital Pocket (Harsh Xenon Flash & CCD Sensor Clip)
    </option>
    
    <option disabled>───────────────────</option>
    
    <option value="Neon-drenched cyberpunk synthwave color grading, surreal psychedelic dream-logic visuals, high-energy rapid strobe light pacing contrast, brilliant fluorescent pink and cyan ambient lighting saturation, abstract lens flare streaks across the lens.">
        Music Video Grid (Neon Vaporwave & Psychedelic Dream-Logic)
    </option>

    <option value="Avant-garde fashion film editorial framing, frantic jump-cut montage pacing, highly stylized alternative lo-fi music video textures, dramatic high-angle tilted compositions, high-fashion art-house lighting structures.">
        Stylized Avant-Garde (Frenetic Cuts & Lo-Fi Textures)
    </option>

    <option value="Dark moody neo-noir atmospheric styling, shot on 35mm monochrome black-and-white high-contrast film print, raking venetian blind shadow silhouettes cast onto surfaces, glistening wet rain-slicked asphalt reflections, sharp chiascuro studio spot lighting.">
        Neo-Noir Shadow (High-Contrast B&W & Rain Reflections)
    </option>
    
    <option disabled>───────────────────</option>
    
    <option value="Saturated anime-inspired cinematic animation frame, rich vibrant ink linework, high-fidelity cell shading aesthetics, dramatic volumetric sky backlighting, epic magical fantasy color grading, fluid hyper-stylized keyframe motion curves.">
        Cel Shaded Anime (Vibrant Sky Backlighting & Linework)
    </option>

    <option value="Sleek high-octane IMAX 70mm action camera frame format, massive deep depth field scope, pristine high-velocity tracking shots, crisp daylight exposure rendering, rich cinematic contrast balance, expansive scale masterwork composition.">
        IMAX Arena (70mm Scale, High-Velocity Tracking Open Focus)
    </option>

    <option value="Ethereal hyper-stylized slow-motion sequence, shot on Phantom Flex 4K at 1000fps, mesmerizing fluid kinetic particulate tracking, ultra-precise motion clarity, soft wrapping rim-lighting accents, dreamlike ambient flow.">
        Phantom Overcrank (1000fps Slow-Motion Macro Clarity)
    </option>

    <option value="Intimate indie-film festival aesthetic, shot on naturalistic prime lenses, shallow focus field separating planes, muted pastel color profile palette, soft organic morning window light illumination, delicate humanistic grading tones.">
        Indie Sundance (Natural Pastel Palette & Soft Window Light)
    </option>

    <option value="Dystopian brutalist scifi aesthetic, industrial desaturated corporate color palette science, heavy volumetric concrete atmospheric dust haze, cold clinical overcast sky lighting grids, geometric hard-edge architectural alignment composition.">
        Brutalist SciFi (Desaturated Industrial & Dust Haze)
    </option>
</select>
                </div>
                <div class="form-group">
                    <label>Structural Layout</label>
                    <select id="p-structure">
                        <option value="multi">Multi-Shot Sequence Block</option>
                        <option value="single">Single Continuous Shot</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Sequence Duration</label>
                    <div class="slider-box">
                        <input type="range" id="p-duration" min="4" max="30" value="10" step="1">
                        <span class="slider-val" id="val-duration">10s</span>
                    </div>
                </div>
                <div class="form-group" id="container-shots-count">
                    <label>Shot Divisions (1 - 20)</label>
                    <div class="slider-box">
                        <input type="range" id="p-shots" min="1" max="20" value="4" step="1">
                        <span class="slider-val" id="val-shots">4 Shots</span>
                    </div>
                </div>
            </div>

            <div class="form-group" id="container-timing-preset">
                <label>Shot Duration Pacing Mix</label>
                <select id="p-timing-preset">
                    <option value="uniform">Uniform Balanced Divisions (Equal beats)</option>
                    <option value="front">Front-Ended Sequence (Rapid opening cuts)</option>
                    <option value="back">Back-Ended Sequence (Cuts quicken near end)</option>
                    <option value="erratic">Erratic Disjointed Mix (Randomized durations)</option>
                </select>
            </div>
        </div>

        <div class="panel" id="panel-lock-registry">
            <h2>2. Shot Controls</h2>
            <label style="margin-bottom: 0.25rem; display: block;">Toggle 🔒 to freeze camera path and action mechanics on individual shots</label>
            <div class="lock-container" id="lock-rows-wrapper"></div>
        </div>

        <div class="panel">
            <h2>3. SCENE & ACTION</h2>
            <div class="form-group">
                <label>Subject Scenario Anchor (insert idea here)</label>
<input type="text" id="p-subject" placeholder="Enter Subject Scenario Anchor...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Action/Motion</label>
<select id="p-genre">
    <option value="universal" selected>Universal/General (Default Stock)</option>
    <option value="flashlight">Flashlight</option>
    <option value="cyberpunk">Sci-Fi & Cyberpunk Pack</option>
    <option value="horror">Horror & Survival Pack</option>
    <option value="car_chase">Car Chase Pack</option>
    
    <option disabled>───────────────────</option>
    
    <option value="beverage">Beverage</option>
    <option value="office">Office</option>
    <option value="tech">Tech</option>
    <option value="door">Door</option>
    <option value="clothing">Clothing</option>
    <option value="maintenance">Maintenance</option>
    <option value="map">Map</option>
    <option value="medical">Medical</option>
    <option value="cleaning">Cleaning</option>

    <option disabled>───────────────────</option>

    <option value="mixmatch">Mix-Match</option>
    <option value="combat">Martial Arts & Combat Pack</option>
    <option value="dance">Dance Pack</option>
    <option value="sports">Sports Pack</option>
    <option value="formal">Formal/Interview Pack</option>

    <option disabled>───────────────────</option>

    <option value="external" disabled id="opt-external">📂 Loaded External Profile Matrix</option>
</select>
                </div>
                <div class="form-group">
                    <label>Import Custom File (.txt / .json)</label>
                    <div class="file-upload-wrapper">
                        <span class="file-upload-btn" id="file-label-view">Choose Behavior File...</span>
                        <input type="file" id="p-file-loader" accept=".txt,.json">
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
<label>Primary Camera Vector</label>
                    <select id="p-movement">
                        <option value="randomize">🎲 Sequenced Random Variations per Shot</option>
                        <option value="Pan movement">Pan Tracking Only</option>
                        <option value="Tilt transition">Tilt Transition Only</option>
                        <option value="Dolly path tracking">Dolly Path Only</option>
                        <option value="Horizontal tracking run">Tracking Run Only</option>
                        <option value="Focal zoom adjustment">Focal Zoom Only</option>
                        <option value="Orbit loop vector">Orbit Loop Only</option>
                        <option value="Handheld organic sway">Handheld Drift Only</option>
                        <option value="Immersive first-person POV tracking, camera locked directly to the subject's eye-line perspective">POV Perspective Only</option>
                        <option value="Ultra-wide first-person POV perspective, the subject's arms, swinging hands, and lower legs or feet are dynamically visible in the lower frame foreground as they move">POV (With Arms & Feet Visible)</option>
                        <option value="Cinematic push-in dolly zoom tracking closer">Cinematic Push-In Only</option>
                        <option value="Dolly pull-out revealing wider scale view">Dolly Pull-Out Only</option>
                        <option value="Vertical crane lift rising upward high perspective">Vertical Crane Up Only</option>
                        <option value="Jib boom lowering downward close tracking vector">Vertical Crane Down Only</option>
                        <option value="Pedestal height shift moving vertically level">Pedestal Shift Only</option>
                        <option value="Dramatic Dutch angle tilt roll orientation axis">Dutch Angle Roll Only</option>
                        <option value="Arc tracking rotation framing side profile paths">Arc Tracking Only</option>
                        <option value="Whip pan transition snapping swiftly to target">Whip Pan Only</option>
                        <option value="Vertigo effect opposite lens zoom pull alignment">Vertigo Dolly-Zoom Only</option>
                        <option value="Low ground angle sweep scanning upward focus">Low Ground Sweep Only</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kinetic Energy Intensity</label>
                    <div class="slider-box">
                        <input type="range" id="p-energy" min="0" max="10" value="3" step="1">
                        <span class="slider-val" id="val-energy">LVL 3</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>4. DIALOGUE</h2>
<!-- START: Speaker Context Extension -->
<div class="input-group-wrapper" style="margin-bottom: 12px;">
    <label for="audio-speaker-context" style="display: block; font-weight: bold; margin-bottom: 4px;">Speaker/Audio Profile Context (Optional):</label>
    <input type="text" id="audio-speaker-context" placeholder="e.g., [Male, British, aristocratic, solemn ]" style="width: 100%; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc;">
</div>
<!-- END: Speaker Context Extension -->
            <div class="form-group">
                <label>Script Submissions (Line-breaks create unique tracks)</label>
                <textarea id="p-dialogue" rows="3" placeholder="Line of dialogue 1...&#10;Line of dialogue 2..."></textarea>
            </div>
<div class="form-group" id="container-dialogue-shift" style="margin-top: 0.5rem;">
                <label>Dialogue Timeline Distribution Shift</label>
                <div class="slider-box">
                    <input type="range" id="p-dialogue-shift" min="0" max="10" value="0" step="1">
                    <span class="slider-val" id="val-dialogue-shift">Offset 0</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>5. MANUAL SHOT OVERRIDES (OPTIONAL)</h2>
            <div class="form-group">
                <label style="color: #ff6600; font-weight: bold; margin-bottom: 4px;">Shot Content Override Box (Line 1 = Shot 1, Line 2 = Shot 2, etc.):</label>
                <textarea id="p-manual-actions-blob" rows="4" placeholder="Line 1 manual prompt text here...&#10;Line 2 manual prompt text here...&#10;Leave rows completely blank to run auto-pilot database matrices..." style="width: 100%; box-sizing: border-box;"></textarea>
            </div>
        </div>

        <div class="panel">
            <h2>6. AUDIO</h2>
            <div class="form-group">
                <label>Audio settings</label>
                <select id="p-audiomode">
                    <option value="foley">Foley FX & Ambient Atmosphere Only</option>
                    <option value="soundtrack">Foley + Layered Instrumental Soundtrack</option>
                </select>
            </div>
            
            <div id="soundtrack-expansion-panel" class="form-row hidden-panel" style="margin-top:0.75rem;">
                <div class="form-group">
                    <label>Music Instrumentation</label>
                    <select id="p-instrument"></select>
                </div>
                <div class="form-group">
                    <label>Compositional Mood</label>
                    <select id="p-mood"></select>
                </div>
            </div>
        </div>

    </div>

    <div class="sticky-aside canvas-area panel">
        <h2>7. GENERATED PROMPT</h2>
        
        <button class="btn-action btn-roll" onclick="rollUnlockedElements()">🎲 Regenerate Prompt</button>
        
        <div class="stream-view" id="output-view">Initializing matrix engines...</div>
        
        <div class="footer-metrics">
            <div class="metric-label">String Metrics: <span id="char-counter" style="color:var(--success); font-weight:700;">0</span> / 7500 chars</div>
            <div id="budget-warning" style="font-size:0.75rem; font-weight:700;"></div>
        </div>

        <button class="btn-action" onclick="copyPipelineOutput()">Copy Prompt</button>
    </div>

</div>

<script>
const OPTICAL_POOL = [
        "Pan movement tracking", "Tilt transition vector", "Dolly path tracking", "Horizontal tracking run",

        "Vertigo effect zolly camera movement",
        "Low-angle tracking shot skimming the ground",
        "High-angle overhead bird's-eye perspective",
        "Dutch angle tilted horizon framing shift",
        "Slow fluid push-in tracking shot approaching the subject",

        "Dynamic 360-degree rotational arc orbit shot",

        "Dolly pull-out tracking shot, smoothly retreating backward to isolate the subject as small within a massive environment",

    function calculateSegmentDurations(totalTime, shotCount, preset) {
        let fractions = [];
        if (preset === "uniform" || shotCount === 1) {
            for (let i = 0; i < shotCount; i++) fractions.push(1);
        } else if (preset === "front") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + i * 0.5);
        } else if (preset === "back") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + (shotCount - 1 - i) * 0.5);
        } else if (preset === "erratic") {
            for (let i = 0; i < shotCount; i++) fractions.push(1 + (Math.sin(i * 1.7 + totalTime) + 1) * 0.8);
        }
        let sum = fractions.reduce((a, b) => a + b, 0);
        return fractions.map(f => (f / sum) * totalTime);
    }

function calculateDialogueMapping(totalShots, scriptLines, shiftValue) {
    const dialogueMap = {};
    if (!scriptLines || scriptLines.length === 0 || totalShots <= 0) return dialogueMap;

    const lineCount = scriptLines.length;

    scriptLines.forEach((line, index) => {
        // 1. Calculate a normalized baseline position for this line between 0.0 and 1.0
        const normalPosition = lineCount > 1 ? index / (lineCount - 1) : 0;

        // 2. Linear Spacing Baseline (when slider is 0, they sit perfectly back-to-back at the start)
        const tightIndex = index;

        // 3. Maximum Expanded Spacing Baseline (stretches lines evenly across the entire shot list)
        const fullyExpandedIndex = Math.floor(normalPosition * (totalShots - 1));

        // 4. Use the slider value (0 to 4+) as an interpolation weight factor
        // As the slider increases, spacing transitions smoothly from tight to fully stretched
        const interpolationFactor = Math.min(shiftValue / 4, 1); // Normalize slider input safely to a 0.0 - 1.0 range
        
        let targetShotIndex = Math.round(tightIndex + (fullyExpandedIndex - tightIndex) * interpolationFactor);

        // 5. Boundary Guard: Clamp values within structural limits
        if (targetShotIndex >= totalShots) targetShotIndex = totalShots - 1;
        if (targetShotIndex < 0) targetShotIndex = 0;

        // 6. Sequential Preservation Loop: If this index is blocked by a previous line,
        // push it forward step-by-step to the next available shot slot to maintain chronological order
        while (dialogueMap[targetShotIndex] !== undefined && targetShotIndex < totalShots - 1) {
            targetShotIndex++;
        }

        // 7. Ultimate Collision Override: If it runs out of space at the end, 
        // find the absolute closest empty shot space behind it to prevent line deletion bugs
        while (dialogueMap[targetShotIndex] !== undefined && targetShotIndex > 0) {
            targetShotIndex--;
        }

        // Final registration entry
        dialogueMap[targetShotIndex] = line;
    });

    return dialogueMap;
}

        let words = anchorText.split(/\s+/).filter(w => w.length > 0);
        if (words.length <= 6) return words.join(" ");
        return words.slice(0, 6).join(" ");
    }
function compilePipelineOutput() {
    const category = document.getElementById("p-category").value;
    const structure = document.getElementById("p-structure").value;
    const duration = parseInt(document.getElementById("p-duration").value) || 10;
    const totalShots = structure === "single" ? 1 : (parseInt(document.getElementById("p-shots").value) || 1);
    const timingPreset = document.getElementById("p-timing-preset").value;
    const energy = parseInt(document.getElementById("p-energy").value) || 0;
    
    let rawAnchor = document.getElementById("p-subject") ? document.getElementById("p-subject").value.trim() : "";
    if (!rawAnchor || rawAnchor.toLowerCase() === "unspecified visual baseline" || rawAnchor === "") {
        rawAnchor = "Character";
    }
    const anchorSubject = rawAnchor;
    
    const dialogueInput = document.getElementById("p-dialogue") ? document.getElementById("p-dialogue").value : "";
    const shiftValue = document.getElementById("p-dialogue-shift") ? parseInt(document.getElementById("p-dialogue-shift").value) : 0;
    const audioMode = document.getElementById("p-audiomode") ? document.getElementById("p-audiomode").value : "foley";

    const scriptLines = dialogueInput.split('\n').map(l => l.trim()).filter(l => l !== '');
    const speakerProfile = document.getElementById("audio-speaker-context") ? document.getElementById("audio-speaker-context").value.trim() : "";
    
    // Fallback safe duration calculation if layout math drops helper logic
    const shotDurations = typeof calculateSegmentDurations === "function" ? calculateSegmentDurations(duration, totalShots, timingPreset) : Array(totalShots).fill(duration / totalShots);
    const dialogueMap = typeof calculateDialogueMapping === "function" ? calculateDialogueMapping(totalShots, scriptLines, shiftValue) : {};

    if (PERSISTENT_SHOTS_DATA.length !== totalShots) {
        if (typeof syncDynamicLockRegistry === "function") syncDynamicLockRegistry();
    }

    let subjectSnippet = anchorSubject;
    let cleanStyleLabel = "cinematic";
    if (category) {
        let baseSegment = category.split(/[,(|\n]/)[0].trim();
        cleanStyleLabel = baseSegment.replace(/(film|print|emulation|footage|stock|format|grade|capture|stream|aesthetic)/i, "").trim();
        cleanStyleLabel = cleanStyleLabel.charAt(0).toUpperCase() + cleanStyleLabel.slice(1);
    }

    let introductoryPremise = structure === "single" 
        ? `A continuous tracking single-shot cinematic sequence featuring ${anchorSubject} (Total Duration: ${duration}s).`
        : `A multi-shot ${cleanStyleLabel} sequence of a ${anchorSubject}, shot as a series of quick cuts (Total Duration: ${duration}s).`;

    let viewHtml = `<span class="t-meta">${introductoryPremise}</span>\n`;
    viewHtml += `<span class="t-meta">CONFIG PROFILE: [Type: ${category}] [Structure: ${structure === "single" ? "Continuous Shot" : "Sequence Array"}]</span>\n\n`;
    
    let rawText = `${introductoryPremise}\nCONFIG PROFILE: [Type: ${category}] [Structure: ${structure === "single" ? "Continuous Shot" : "Sequence Array"}]\n\n`;

    const overrideBlob = document.getElementById("p-manual-actions-blob");
    const overrideLines = overrideBlob ? overrideBlob.value.split('\n') : [];

    for (let i = 0; i < totalShots; i++) {
        let rawDur = shotDurations[i] || (duration / totalShots);
        let roundedDur = Math.round(rawDur * 2) / 2;
        if (roundedDur <= 0) roundedDur = 0.5;
        let currentDur = roundedDur.toString();

        let vibrationMod = "";
        if (energy > 0) {
            if (energy <= 3) vibrationMod = "with subtle stable stabilization anchors";
            else if (energy > 3 && energy <= 7) vibrationMod = "accompanied by loose handheld organic drift patterns";
            else vibrationMod = "driven by erratic high-frequency tracking jitters and rapid tracking corrections";
        } else { vibrationMod = "locked absolute zero-velocity tripod lock"; }

        let shotMemory = PERSISTENT_SHOTS_DATA[i] || { camera: "Static establishing medium shot", action: "", cameraLocked: false, actionLocked: false };
        
        let statusMarkers = "";
        if (shotMemory.cameraLocked) statusMarkers += "🔒📷 ";
        if (shotMemory.actionLocked) statusMarkers += "🔒🏃‍♂️ ";

        let targetActionText = "";
        let isManualOverride = false;

        if (overrideLines[i] && overrideLines[i].trim() !== "") {
            targetActionText = overrideLines[i].trim();
            isManualOverride = true;
        } else {
            targetActionText = (shotMemory.action || "").trim();
        }
        
        targetActionText = targetActionText.replace(/^A focused character/i, "").trim();
        targetActionText = targetActionText.replace(/^Character/i, "").trim();

        let highImpactAction = targetActionText || "Performs default background environmental calibration motion.";

        if (!isManualOverride && targetActionText !== "") {
            highImpactAction = `${subjectSnippet} ${targetActionText}`;
        }

        highImpactAction = highImpactAction.replace(/\s+/g, " ").trim();
        if (!highImpactAction.endsWith(".")) highImpactAction += ".";
        highImpactAction = highImpactAction.charAt(0).toUpperCase() + highImpactAction.slice(1);

// 1. Visual version with lock icons for your screen display panel layout
        let transitionMarkerVisual = structure === "single"
            ? `Scene Playback (Duration: ${currentDur}s): ${statusMarkers}`
            : (i === 0 ? `Shot 1 (Duration: ${currentDur}s): ${statusMarkers}` : `Cut to Shot ${i + 1} (Duration: ${currentDur}s): ${statusMarkers}`);

        // 2. Clean version with NO lock icons for your clipboard copy data
        let transitionMarkerClean = structure === "single"
            ? `Scene Playback (Duration: ${currentDur}s):`
            : (i === 0 ? `Shot 1 (Duration: ${currentDur}s):` : `Cut to Shot ${i + 1} (Duration: ${currentDur}s):`);

        let cleanCamRaw = shotMemory.camera || "Static establishing medium shot";
        let cameraClause = `Axis directional ${cleanCamRaw}, ${vibrationMod}.`;
        
        // This line sends the lock icons to your web browser window view screen
        viewHtml += `<span class="t-time">${transitionMarkerVisual}</span> <span class="t-cam">${cameraClause}</span> <span class="t-dir">${highImpactAction}</span>\n`;
        
        // This line keeps the text completely clean when you go to copy it
        rawText  += `${transitionMarkerClean} ${cameraClause} ${highImpactAction}\n`;

        if (dialogueMap[i]) {
            let formattedAudioSegment = speakerProfile ? `${speakerProfile}: "${dialogueMap[i]}"` : `"${dialogueMap[i]}"`;
            viewHtml += `<span class="t-audio"> - Audio Sync: ${formattedAudioSegment}</span>\n`;
            rawText  += ` - Audio Sync: ${formattedAudioSegment}\n`;
        }
        viewHtml += `\n`; rawText  += `\n`;
    }

    viewHtml += `<span class="t-audio">Aesthetic & Directional Layer Rules:</span>\n`;
    rawText  += `Aesthetic & Directional Layer Rules:\n`;

    if (audioMode === "foley") {
        viewHtml += `<span class="t-audio"> - Audio: Natural environment location foley effects, high atmospheric background noise track preservation.</span>\n`;
        rawText  += ` - Audio: Natural environment location foley effects, high atmospheric background noise track preservation.\n`;
    } else {
        const inst = document.getElementById("p-instrument") ? document.getElementById("p-instrument").value : "Acoustic";
        const mood = document.getElementById("p-mood") ? document.getElementById("p-mood").value : "Ambient";
        viewHtml += `<span class="t-audio"> - Audio: Local physical environmental foley synced with instrumental soundtrack layer [Score: ${inst}] [Acoustic Vibe: ${mood}].</span>\n`;
        rawText  += ` - Audio: Local physical environmental foley synced with instrumental soundtrack layer [Score: ${inst}] [Acoustic Vibe: ${mood}].\n`;
    }

    viewHtml += `<span class="t-meta"> - Render Directives: Sequential multi-angle storyboard edits. Render crisp high-definition resolution. No letterboxing fields.</span>`;
    rawText  += ` - Render Directives: Sequential multi-angle storyboard edits. Render crisp high-definition resolution. No letterboxing fields.`;

    const viewContainer = document.getElementById("output-view");
    if (viewContainer) {
        viewContainer.innerHTML = viewHtml;
        viewContainer.setAttribute("data-raw", rawText);
    }

    const counter = document.getElementById("char-counter");
    if (counter) counter.innerText = rawText.length;
}
    function updateTokenBudgetUi(charCount) {
        const label = document.getElementById("char-counter");
        const warn = document.getElementById("budget-warning");
        label.innerText = charCount;
        if (charCount <= 5500) { label.style.color = "var(--success)"; warn.innerText = ""; } 
        else if (charCount > 5500 && charCount <= 7500) {
            label.style.color = "var(--warning)"; warn.innerText = "⚠️ APPROACHING SEEDANCE 7500 CHARACTER LIMIT"; warn.style.color = "var(--warning)";
        } else { label.style.color = "var(--danger)"; warn.innerText = "🚨 EXCEEDING MAX SYSTEM TOKEN LIMIT"; warn.style.color = "var(--danger)"; }
    }

    function copyPipelineOutput() {
        navigator.clipboard.writeText(document.getElementById("output-view").getAttribute("data-raw")).then(() => {
            alert("v12.1 custom array output written to system clipboard!");
        });
    }
// --- DROPDOWN PRESET SWITCH PROTECTION LAYOUT ---
(function() {
    let changeBackupCache = [];

    function savePresetSnapshot() {
        if (!window.PERSISTENT_SHOTS_DATA) return;
        // Map out exactly what text and lock statuses look like right now
        changeBackupCache = window.PERSISTENT_SHOTS_DATA.map(shot => ({
            action: shot.action,
            locked: shot.locked === true
        }));
    }

    function restorePresetSnapshot() {
        if (!window.PERSISTENT_SHOTS_DATA || changeBackupCache.length === 0) return;
        let restored = false;

        window.PERSISTENT_SHOTS_DATA.forEach((shot, index) => {
            const cacheItem = changeBackupCache[index];
            // If this item was supposed to be locked, force-restore its description text string
            if (cacheItem && cacheItem.locked) {
                shot.action = cacheItem.action;
                shot.locked = true;
                restored = true;
            }
        });

        if (restored) {
            compilePipelineOutput();
            if (typeof renderShots === "function") renderShots();
        }
    }

    const genreDropdown = document.getElementById("p-genre");
    if (genreDropdown) {
        // Capture a clean snapshot before any value adjustment can occur
        genreDropdown.addEventListener("mousedown", savePresetSnapshot, true);
        genreDropdown.addEventListener("keydown", savePresetSnapshot, true);

        // Run recovery directly when the selection completes changing layout settings
        genreDropdown.addEventListener("change", function() {
            restorePresetSnapshot();
            setTimeout(restorePresetSnapshot, 10);
            setTimeout(restorePresetSnapshot, 100);
        });
    }
})();
</script>
